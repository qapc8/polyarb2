version: '3.9'
services:
  bot:
    build: .
    env_file:
      - .env.example
    ports:
      - '9308:9308'
  prometheus:
    image: prom/prometheus:latest
    command: ['--config.file=/etc/prometheus/prometheus.yml']
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - bot
